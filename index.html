<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공인중개사 수강 캘린더</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <div class="container">
    <!-- 기기 코드 -->
    <div id="deviceCodeSection"></div>

    <!-- 섹션 1: 캘린더 -->
    <section class="calendar-section">
      <div class="calendar-header">
        <div class="calendar-title-wrap">
          <h2 id="calendarTitle"></h2>
          <span class="d-day" id="dDay"></span>
        </div>
        <div class="calendar-nav">
          <button id="prevMonth" class="nav-btn">&larr;</button>
          <button id="nextMonth" class="nav-btn">&rarr;</button>
        </div>
      </div>
      <div class="calendar-grid">
        <div class="day-header">일</div>
        <div class="day-header">월</div>
        <div class="day-header">화</div>
        <div class="day-header">수</div>
        <div class="day-header">목</div>
        <div class="day-header">금</div>
        <div class="day-header">토</div>
        <div id="calendarDays" class="calendar-days"></div>
      </div>
    </section>

    <!-- 섹션 2: 수강 진행 현황 -->
    <section class="progress-section">
      <h2>수강 진행 현황</h2>
      <div class="tab-bar" id="tabBar"></div>
      <div class="progress-content" id="progressContent"></div>
      <div class="goal-section" id="goalSection"></div>
    </section>

    <!-- 섹션 3: 기출문제 풀이 -->
    <section class="exam-section">
      <h2>기출문제 풀이</h2>
      <div id="examPractice"></div>
    </section>

    <!-- 섹션 4: 기출문제 풀이 조회 -->
    <section class="exam-history-section">
      <h2>기출문제 풀이 조회</h2>
      <div id="examHistory"></div>
    </section>
  </div>

  <!-- 세부계획서 FAB -->
  <button class="plan-fab" id="planFab">📋 세부계획서</button>

  <!-- 세부계획서 전체화면 오버레이 -->
  <div class="plan-overlay" id="planOverlay">
    <div class="plan-header">
      <button class="plan-nav-btn" id="planPrevPage">◀</button>
      <span class="plan-page-info" id="planPageInfo">— / —</span>
      <button class="plan-nav-btn" id="planNextPage">▶</button>
      <button class="plan-close" id="planClose">✕ 닫기</button>
    </div>
    <div class="plan-canvas-wrap">
      <canvas id="planCanvas"></canvas>
    </div>
  </div>

  <!-- 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div class="modal-tabs" id="modalTabs"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-cancel" id="modalCancel">취소</button>
        <button class="btn btn-confirm" id="modalConfirm">확인</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script type="module" src="app.js?v=5"></script>
</body>
</html>
