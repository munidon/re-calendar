<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공인중개사 수강 캘린더</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 섹션 1: 캘린더 -->
    <section class="calendar-section">
      <div class="calendar-header">
        <div class="calendar-title-wrap">
          <h2 id="calendarTitle"></h2>
          <span class="d-day" id="dDay"></span>
        </div>
        <div class="calendar-nav">
          <button id="prevMonth" class="nav-btn">&larr;</button>
          <button id="nextMonth" class="nav-btn">&rarr;</button>
        </div>
      </div>
      <div class="calendar-grid">
        <div class="day-header">일</div>
        <div class="day-header">월</div>
        <div class="day-header">화</div>
        <div class="day-header">수</div>
        <div class="day-header">목</div>
        <div class="day-header">금</div>
        <div class="day-header">토</div>
        <div id="calendarDays" class="calendar-days"></div>
      </div>
    </section>

    <!-- 섹션 2: 수강 진행 현황 -->
    <section class="progress-section">
      <h2>수강 진행 현황</h2>
      <div class="tab-bar" id="tabBar"></div>
      <div class="progress-content" id="progressContent"></div>
      <div class="goal-section" id="goalSection"></div>
    </section>
  </div>

  <!-- 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div class="modal-tabs" id="modalTabs"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-cancel" id="modalCancel">취소</button>
        <button class="btn btn-confirm" id="modalConfirm">확인</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
